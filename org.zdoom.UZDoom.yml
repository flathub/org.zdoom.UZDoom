app-id: org.zdoom.UZDoom
runtime: org.freedesktop.Platform
sdk: org.freedesktop.Sdk
runtime-version: '25.08'
command: uzdoom

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # 3D hardware acceleration
  - --device=dri
  # Audio
  - --socket=pulseaudio
  # Controller support - change to device=input once Flatpak 1.14 is EOL.
  # https://discourse.flathub.org/t/support-for-device-input/6645
  - --device=all
  # Allow network for multiplayer gameplay
  - --share=network
  # On order to load WADs from user's game libraries
  - --filesystem=~/.var/app/com.valvesoftware.Steam/data/Steam/steamapps:ro
  - --filesystem=~/.local/share/Steam/steamapps:ro
  - --filesystem=~/snap/steam/common/.local/share/Steam/steamapps:ro

cleanup:
  - "*.a"
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/doc
  - /share/man

modules:
  - shared-modules/linux-audio/libinstpatch.json
  - shared-modules/linux-audio/fluidsynth2.json

  - name: uzdoom
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_CXX_FLAGS=-DSHARE_DIR=\"/app/share\"
      - -DBUILD_FLATPAK=ON
    sources:
      - type: git
        url: https://github.com/UZDoom/UZDoom
        commit: 92788309eabc41076b23bc6963e30d9059773616
        disable-shallow-clone: true
        x-checker-data:
          type: git
          tag-pattern: ^x-flathub-beta$
    post-install:
      - desktop-file-edit --set-key=Name --set-value="UZDoom Beta" /app/share/applications/${FLATPAK_ID}.desktop
