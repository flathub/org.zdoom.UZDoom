app-id: org.zdoom.UZDoom
runtime: org.freedesktop.Platform
sdk: org.freedesktop.Sdk
runtime-version: '25.08'
command: uzdoom

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # 3D hardware acceleration
  - --device=dri
  # Audio
  - --socket=pulseaudio
  # Controller support - change to device=input once Flatpak 1.14 is EOL.
  # https://discourse.flathub.org/t/support-for-device-input/6645
  - --device=all
  # Allow network for multiplayer gameplay
  - --share=network

cleanup:
  - "*.a"
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/doc
  - /share/man

modules:
  - shared-modules/linux-audio/libinstpatch.json
  - shared-modules/linux-audio/fluidsynth2.json

  - name: uzdoom
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_CXX_FLAGS=-DSHARE_DIR=\"/app/share\"
    sources:
      - type: git
        url: https://github.com/UZDoom/UZDoom
        tag: 5.0.0-pre
        commit: d5303d9d9c10d9ccfb8e6dfb20f4272b128bbfe5
        x-checker-data:
          type: json
          url: https://api.github.com/repos/UZDoom/UZDoom/git/refs/tags
          tag-query: last(.[] | select((.ref | contains("-pre")) or (.ref | contains("-rc"))) | .ref | sub("refs/tags/"; ""))
